# BoundHound automation tests.
#
# WHY SELF-HOSTED: building/running Unreal Engine automation needs a machine with UE 5.8 installed
# (~100 GB, licensed). GitHub's hosted runners don't have it, so this job targets a *self-hosted*
# runner you register on a machine that already has the engine + a host UE project. See the setup
# notes at the bottom of this file. Until you register such a runner, this workflow's checks simply
# sit "queued" -- harmless, just pending.

name: Automation Tests

# TRIGGERS: run on PRs into the two long-lived branches, and allow a manual run from the Actions tab.
on:
  pull_request:
    branches: [ contrib, main ]
  workflow_dispatch:

jobs:
  automation-tests:
    # The runner is selected by matching ALL these labels. You give your self-hosted runner the
    # custom label "unreal" during setup so only UE-capable machines pick this up.
    runs-on: [ self-hosted, windows, unreal ]

    # Machine-specific paths. Prefer setting these as repo/runner variables (Settings -> Variables)
    # instead of hard-coding, but defaults are shown so it's copy-runnable.
    #
    # IMPORTANT: HOST_PROJECT should be a DEDICATED CI copy of a UE project that embeds this plugin --
    # NOT your daily-driver working copy, because the sync step below overwrites the plugin source in
    # it with the PR's code. A throwaway project at e.g. C:\CI\BoundHoundDev keeps CI from clobbering
    # your local work.
    env:
      UE_ROOT:         ${{ vars.UE_ROOT     || 'G:\Epic Games\UE_5.8' }}
      HOST_PROJECT:    ${{ vars.HOST_PROJECT || 'C:\CI\BoundHoundDev\BoundHoundDev.uproject' }}
      HOST_PLUGIN_DIR: ${{ vars.HOST_PLUGIN_DIR || 'C:\CI\BoundHoundDev\Plugins\BoundHound' }}

    steps:
      # 1. Check out the PR's version of the plugin into the runner's workspace.
      - name: Check out plugin
        uses: actions/checkout@v4

      # 2. Copy the checkout into the host project's Plugins folder so UE can build it in context.
      #    /MIR mirrors; /XD protects Binaries/Intermediate/.git from being wiped. robocopy uses exit
      #    codes 0-7 for success and >=8 for failure, so we translate that for the step.
      - name: Sync into host project
        shell: pwsh
        run: |
          robocopy "$env:GITHUB_WORKSPACE" "$env:HOST_PLUGIN_DIR" /MIR /XD .git Binaries Intermediate | Out-Null
          if ($LASTEXITCODE -ge 8) { Write-Error "robocopy failed ($LASTEXITCODE)"; exit 1 }
          exit 0

      # 3. Build the editor target. Tests compile in only in Development/Debug (WITH_AUTOMATION_TESTS).
      - name: Build editor target
        shell: pwsh
        run: |
          & "$env:UE_ROOT\Engine\Build\BatchFiles\Build.bat" BoundHoundDevEditor Win64 Development -Project="$env:HOST_PROJECT" -WaitMutex
          if ($LASTEXITCODE -ne 0) { Write-Error "Build failed"; exit 1 }

      # 4. Run the suite headless. RunTests.ps1 exits non-zero on any failure, which fails the job.
      - name: Run automation tests
        shell: pwsh
        run: |
          & "$env:HOST_PLUGIN_DIR\RunTests.ps1" -EnginePath "$env:UE_ROOT" -Project "$env:HOST_PROJECT"

# ---------------------------------------------------------------------------------------------------
# ONE-TIME SELF-HOSTED RUNNER SETUP (on a Windows machine with UE 5.8 + a CI host project):
#
#   1. GitHub repo -> Settings -> Actions -> Runners -> "New self-hosted runner" (Windows).
#   2. Follow the shown commands to download and configure the agent (./config.cmd ...).
#      When asked for labels, add:  unreal   (the run: config also tags it windows + self-hosted).
#   3. Install it as a service so it's always available:  ./svc.cmd install ; ./svc.cmd start
#   4. Create a dedicated CI host project (a UE project that enables the BoundHound plugin) at the
#      HOST_PROJECT path above -- a copy separate from your dev working tree.
#   5. Optionally set repo Variables (Settings -> Variables) UE_ROOT / HOST_PROJECT / HOST_PLUGIN_DIR
#      instead of the hard-coded defaults.
#   6. Once green, you can make it a REQUIRED check: Settings -> Branches/Rulesets -> require the
#      "automation-tests" status before merging into contrib.
# ---------------------------------------------------------------------------------------------------
